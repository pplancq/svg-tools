name: Update Renovate PR Limits

on:
  workflow_dispatch:
    inputs:
      limit:
        description: >
          New limit for prConcurrentLimit and prHourlyLimit (e.g. 5, 0 = unlimited),
          or "reset" to remove local overrides and restore shared config defaults.
        required: true
        type: string
        default: 'reset'

jobs:
  update-renovate-limits:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Update Renovate limits
        uses: pplancq/actions/renovate-update-limits@7cc5778a60fe01a52eff971834f53b2a6201363d # v1.1.1
        with:
          limit: ${{ inputs.limit }}
