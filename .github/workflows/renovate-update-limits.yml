name: Update Renovate PR Limits

on:
  workflow_dispatch:
    inputs:
      limit:
        description: >
          New limit for prConcurrentLimit and prHourlyLimit (e.g. 5, 0 = unlimited),
          or "reset" to remove local overrides and restore shared config defaults.
        required: true
        type: string
        default: 'reset'

jobs:
  update-renovate-limits:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Update Renovate limits
        uses: pplancq/actions/renovate-update-limits@b248bd44a83e2d0c9f9334aff7e33771fdd77c76 # v1.1.2
        with:
          limit: ${{ inputs.limit }}
